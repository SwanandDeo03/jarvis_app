name: jarvis_ai
description: A personal Jarvis AI mobile companion

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.1
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  uuid: ^4.4.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  animated_text_kit: ^4.2.2
  cupertino_icons: ^1.0.2
  flutter_sound: ^9.2.13
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true